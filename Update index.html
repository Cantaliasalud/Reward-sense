<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reward-Sense Lab | Test de Biomarcadores</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #setup, #final { text-align: center; max-width: 600px; padding: 20px; border: 1px solid #333; border-radius: 10px; background: #111; }
        #game { display: none; width: 800px; height: 600px; position: relative; }
        .btn { background-color: #FFBF00; color: #000; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 20px; }
        .btn:hover { background-color: #e5ab00; }
        #target { width: 160px; height: 160px; background-color: #828282; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; }
        #cue-circle { width: 180px; height: 180px; border: 5px solid #FFBF00; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; }
        #cue-triangle { width: 0; height: 0; border-left: 90px solid transparent; border-right: 90px solid transparent; border-bottom: 180px solid #FF4136; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -100px); display: none; }
        #cue-neutral { width: 140px; height: 140px; border: 5px solid #fff; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; }
        #fixation { width: 10px; height: 10px; background-color: #444; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    </style>
</head>
<body>

    <div id="setup">
        <h1>Reward-Sense Lab</h1>
        <p>Este test de 3 minutos medirá tu respuesta pupilar ante recompensas.</p>
        <p style="color: #FF4136;">REQUISITOS: Luz de frente clara, cara descubierta y mirada fija al centro.</p>
        <button class="btn" onclick="startCamera()">ACTIVAR CÁMARA Y EMPEZAR</button>
    </div>

    <div id="game">
        <div id="fixation"></div>
        <div id="cue-circle"></div>
        <div id="cue-triangle"></div>
        <div id="cue-neutral"></div>
        <div id="target"></div>
    </div>

    <div id="final" style="display:none;">
        <h2>Test Completado</h2>
        <p>Tu cerebro ha sido mapeado. Por favor, descarga el video de tus ojos y envíaselo al Doctor por WhatsApp o Email.</p>
        <button class="btn" id="downloadBtn">DESCARGAR VIDEO (.webm)</button>
    </div>

    <video id="preview" autoplay muted style="display:none;"></video>

    <script>
        let mediaRecorder;
        let recordedChunks = [];
        const types = ['reward', 'loss', 'neutral'];
        let trials = [];
        for(let i=0; i<4; i++) trials.push(...types); // 12 rondas para el piloto rápido
        trials = trials.sort(() => Math.random() - 0.5);

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { frameRate: 30 } });
                document.getElementById('preview').srcObject = stream;
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    document.getElementById('downloadBtn').onclick = () => {
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = 'test_ojos_paciente.webm';
                        a.click();
                    };
                };
                mediaRecorder.start();
                document.getElementById('setup').style.display = 'none';
                document.getElementById('game').style.display = 'block';
                runTrials();
            } catch (err) { alert("Error al acceder a la cámara. Revisa los permisos."); }
        }

        async function runTrials() {
            for (let i = 0; i < trials.length; i++) {
                const type = trials[i];
                // 1. Fijación (2s)
                await sleep(2000);
                // 2. Cue (1.5s)
                const cue = document.getElementById(`cue-${type === 'reward' ? 'circle' : type === 'loss' ? 'triangle' : 'neutral'}`);
                cue.style.display = 'block';
                await sleep(1500);
                cue.style.display = 'none';
                // 3. Espera (5s) - AQUÍ SE CAPTURA LA PUPILA
                await sleep(5000);
                // 4. Target (0.5s)
                document.getElementById('target').style.display = 'block';
                await sleep(500);
                document.getElementById('target').style.display = 'none';
            }
            mediaRecorder.stop();
            document.getElementById('game').style.display = 'none';
            document.getElementById('final').style.display = 'block';
        }

        function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }
    </script>
</body>
</html>
